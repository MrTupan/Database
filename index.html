<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Profit Tracker</title>

  <!-- ============================================================================ -->
  <!-- STEP 1: PWA & IOS MOBILE APP CONFIGURATION -->
  <!-- ============================================================================ -->
  
  <!-- This file tells the phone how to behave when installed on the home screen -->
  <link rel="manifest" href="manifest.json">
  
  <!-- theme-color sets the background of the status bar area -->
  <meta name="theme-color" content="#0f172a">

  <!-- iOS Support: Enables full-screen mode (Hides the Safari Address Bar) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <!-- Makes the top status bar (Clock/Battery) blend into the dark design -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- The name that appears under the icon on the home screen -->
  <meta name="apple-mobile-web-app-title" content="Workshop">
  
  <!-- The icon used when adding to the home screen on iPhone -->
  <link rel="apple-touch-icon" href="logo.png">

  <!-- ============================================================================ -->
  <!-- STEP 2: LOAD EXTERNAL CLOUD & UI LIBRARIES -->
  <!-- ============================================================================ -->
  
  <!-- Firebase Compatibility SDKs for Real-time Data Sync -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  
  <!-- Tailwind CSS for Responsive Design Utility Classes -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 Engine for Component-based UI Architecture -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone for In-Browser JSX and ES6 Compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- External Design Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- MASTER MOUNT POINT -->
  <!-- This is where the React application will be rendered after compilation -->
  <div id="root">
     <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; color:#f97316; font-family:sans-serif; flex-direction:column; gap:20px;">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight:bold; font-size:12px; text-align:center; letter-spacing: 2px; text-transform: uppercase;">
            Initializing System...
        </div>
     </div>
  </div>

  <!-- ============================================================================ -->
  <!-- STEP 3: LOAD CORE CONFIGURATION FILES -->
  <!-- ============================================================================ -->
  
  <!-- These files establish the global 'db' and 'T' (Translations) objects -->
  <script src="firebase-config.js"></script>
  <script src="translations.js"></script>
  
  <!-- ============================================================================ -->
  <!-- STEP 4: DYNAMIC MODULE LOADER & PWA ENGINE -->
  <!-- ============================================================================ -->
  <script>
    // Selection of the status element to provide visual feedback during boot
    var statusText = document.getElementById('status-text');

    /**
     * THE MASTER FILE REGISTRY
     * Every modular JS file must be registered here in the exact order 
     * of dependency to ensure a successful build.
     */
    var files = [
      'utils.js', 
      'contexts.js', 
      'login.js', 
      'sidebar.js', 
      'dashboard.js',
      'transactions.js', 
      'expenses.js', 
      'loans.js', 
      'workers.js', 
      'reports.js',
      'partner-mechanic.js', 
      'partner-painter.js', 
      'partner-electrician.js',
      'partner-tire-shop.js', 
      'partner-spare-parts.js', 
      'partner-oil-sales.js',
      'partner-dent-repairer.js', // Added: New Partner Module
      'main-app.js' // Main application logic must remain last
    ];

    // Global variable to accumulate the raw code from all modules
    var combinedCode = "";

    /**
     * loadFile (Recursive Function)
     * logic: Fetches each local file via XMLHttpRequest, appends it 
     * to a single string, and then executes the Babel compiler.
     */
    function loadFile(index) {
      // Check if all files in the registry have been processed
      if (index >= files.length) {
        statusText.innerText = "Finalizing Compilation...";
        try {
          // Compile the giant combined string into browser-executable JS
          var output = Babel.transform(combinedCode, { presets: ['react'] }).code;
          var script = document.createElement('script');
          script.text = output;
          // Inject the compiled application into the DOM
          document.body.appendChild(script);
          console.log("System Status: All modules compiled and active.");
        } catch (err) {
          // Visual Error Handling if a syntax error exists in any module
          statusText.innerText = "COMPILER ERROR: " + err.message;
          statusText.style.color = "#ef4444";
          console.error("Compilation Failure:", err);
        }
        return;
      }

      // Identify the current target file
      var name = files[index];
      statusText.innerText = "SYNCING: " + name;

      // Initiate a network request to read the local asset file
      var xhr = new XMLHttpRequest();
      xhr.open("GET", name, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          // Logic: status 0 is used for local file system access in Android WebViews
          if (xhr.status === 200 || xhr.status === 0) {
            combinedCode += "\n/* Module: " + name + " */\n" + xhr.responseText;
            // Recursively load the next file in the list
            loadFile(index + 1);
          } else {
            // Error handling for missing files in the assets folder
            statusText.innerText = "REGISTRY ERROR: Missing " + name;
            statusText.style.color = "#ef4444";
            console.error("File Not Found: " + name);
          }
        }
      };
      xhr.send();
    }

    /**
     * SYSTEM BOOTSTRAP
     * Small delay ensures that Firebase SDKs are ready before loading data logic.
     */
    setTimeout(function() { 
      console.log("System Bootstrap: Commencing module sequence...");
      loadFile(0); 
    }, 600);

    /**
     * SERVICE WORKER REGISTRATION (PWA)
     * logic: Registers the background engine that allows the app to load
     * full-screen and work effectively on mobile devices.
     */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(registration) {
          console.log('PWA ServiceWorker registered with scope: ', registration.scope);
        }, function(err) {
          console.log('PWA ServiceWorker registration failed: ', err);
        });
      });
    }

  </script>
</body>
</html>
